version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cyberlens-postgres
    environment:
      POSTGRES_USER: cyberlens
      POSTGRES_PASSWORD: cyberlens_secret_2024
      POSTGRES_DB: cyberlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberlens"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberlens-net
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: cyberlens-neo4j
    environment:
      NEO4J_AUTH: neo4j/cyberlens_neo4j_2024
      NEO4J_dbms_memory_heap_max__size: 2G
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p cyberlens_neo4j_2024 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - cyberlens-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberlens-backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: cyberlens
      POSTGRES_PASSWORD: cyberlens_secret_2024
      POSTGRES_DB: cyberlens
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: cyberlens_neo4j_2024
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cyberlens_jwt_secret_key_change_in_production_2024}
      LLM_API_URL: ${LLM_API_URL:-http://ollama:11434/api/generate}
      LLM_MODEL: ${LLM_MODEL:-local}
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://frontend:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - cyberlens-net
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: cyberlens-frontend
    working_dir: /app
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - cyberlens-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cyberlens-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - cyberlens-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: cyberlens-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - cyberlens-net
    restart: unless-stopped

networks:
  cyberlens-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  backend_uploads:
  frontend_node_modules:
  ollama_data:
